name: Discord Push Notify

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - reopened
      - synchronize

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send notification to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CONTENT="📌 ${{ github.repository }}
🌿 브랜치: ${{ github.ref_name }}
👤 작성자: ${{ github.actor }}
📝 커밋: ${{ github.event.head_commit.message }}
🔗 ${{ github.event.head_commit.url }}"
          else
            CONTENT="📌 ${{ github.repository }}
🔀 PR 알림
🌿 대상 브랜치: ${{ github.event.pull_request.base.ref }}
🪴 작업 브랜치: ${{ github.event.pull_request.head.ref }}
👤 작성자: ${{ github.actor }}
📝 제목: ${{ github.event.pull_request.title }}
🔗 ${{ github.event.pull_request.html_url }}"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$(jq -n --arg content "$CONTENT" '{content: $content}')" \
          "$DISCORD_WEBHOOK_URL"